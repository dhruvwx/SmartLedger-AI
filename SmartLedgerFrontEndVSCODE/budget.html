<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
     <div class="card p-4 shadow">

      <h2>Budget Management</h2>

      <input type="number" id="budgetAmount" class="form-control mb-3" placeholder="Monthly Budget Amount">

      <input type="number" id="month" class="form-control mb-3" placeholder="Month">

      <input type="number" id="year" class="form-control mb-3" placeholder="Year">

      <select id="category" class="form-select mb-3">
        <option value="">Select Category</option>
      </select>

      <button id="saveBudgetButton" class="btn btn-primary">Save Budget</button>


      <hr>
      <table class="table mt-3">
        <thead>
          <tr>
            <th>Budget Limit</th>
            <th>category</th> 
            <th>Spent</th> 
            <th>Remaining</th>
          </tr>
        </thead>
        <tbody id="budgetTableBody"></tbody>
      </table>
    

     </div>
  </div>
  
  <script src="javascript/budget.js"></script>
</body>
</html>
