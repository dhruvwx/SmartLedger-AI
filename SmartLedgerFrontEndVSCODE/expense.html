<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand" href="dashboard.html">
            SmartLedger
        </a>

        <div>

            <a
            href="dashboard.html"
            class="btn btn-outline-light me-2">
            Dashboard
            </a>

            <a
            href="expense.html"
            class="btn btn-outline-light me-2">
            Expenses
            </a>

            <a
            href="budget.html"
            class="btn btn-outline-light me-2">
            Budgets
            </a>

            <button
            id="logoutButton"
            class="btn btn-danger">
            Logout
            </button>

        </div>

    </div>

</nav>

  <div class="container mt-5">
    <div class="card p-4 shadow">
      <h2>Expense Management</h2>

      <input
      type="text"
      id="description"
      class="form-control mb-3"
      placeholder="Expense Description"
      required>

       <input
      type="number"
      id="amount"
      class="form-control mb-3"
      placeholder="Amount"
      min="0.01"
      step="0.01"
      required>

      <input
      type="date"
      id="date"
      class="form-control mb-3">

       <button
      id="saveExpenseButton"
      class="btn btn-primary">
      Save Expense
      </button>

      <hr>


      <!-- FILTER SECTION -->
<div class="card shadow p-3 mb-4">

    <h4 class="mb-3">
        Filters
    </h4>

    <div class="row">

        <!-- Category -->
        <div class="col-md-2">

            <select
                id="filterCategory"
                class="form-select">

                <option value="">
                    All Categories
                </option>

            </select>

        </div>


        <!-- Month -->
        <div class="col-md-2">

            <select
                id="filterMonth"
                class="form-select">

                <option value="">
                    All Months
                </option>

                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>

            </select>

        </div>


        <!-- Min Amount -->
        <div class="col-md-2">

            <input
                type="number"
                id="minAmount"
                class="form-control"
                placeholder="Min Amount">

        </div>


        <!-- Max Amount -->
        <div class="col-md-2">

            <input
                type="number"
                id="maxAmount"
                class="form-control"
                placeholder="Max Amount">

        </div>


        <!-- Sort By -->
        <div class="col-md-2">

            <select
                id="sortBy"
                class="form-select">

                <option value="">
                    Sort By
                </option>

                <option value="amount">
                    Amount
                </option>

                <option value="date">
                    Date
                </option>

            </select>

        </div>


        <!-- Sort Order -->
        <div class="col-md-2">

            <select
                id="sortOrder"
                class="form-select">

                <option value="">
                    Order
                </option>

                <option value="asc">
                    Ascending
                </option>

                <option value="desc">
                    Descending
                </option>

            </select>

        </div>

    </div>

    <div class="mt-3">

        <button
            id="applyFiltersButton"
            class="btn btn-primary">

            Apply Filters

        </button>

        <button
            id="clearFiltersButton"
            class="btn btn-secondary">

            Clear Filters

        </button>

    </div>

</div>


       <table class="table mt-3">
        <thead>
          <tr>
            <th>Description</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Category</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="expenseTableBody"></tbody>
      </table>


      <div class="mt-3 text-center">

    <button
        id="prevPage"
        class="btn btn-secondary">

        Previous

    </button>

    <span
        id="pageNumber"
        class="mx-3">

        Page 1

    </span>

    <button
        id="nextPage"
        class="btn btn-secondary">

        Next

    </button>

</div>



    </div>
  </div>
<script src="javascript/api.js"></script>
<script src="javascript/common.js"></script>
<script src="javascript/expense.js"></script>
</body>
</html>
