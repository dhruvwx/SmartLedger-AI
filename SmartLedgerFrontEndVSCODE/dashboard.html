<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" href="">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand" href="dashboard.html">
            SmartLedger
        </a>

        <div>

            <a
            href="dashboard.html"
            class="btn btn-outline-light me-2">
            Dashboard
            </a>

            <a
            href="expense.html"
            class="btn btn-outline-light me-2">
            Expenses
            </a>

            <a
            href="budget.html"
            class="btn btn-outline-light me-2">
            Budgets
            </a>

            <button
            id="logoutButton"
            class="btn btn-danger">
            Logout
            </button>

        </div>

    </div>

</nav>

    <div class="container mt-5">

        <h2 class="mb-4">
            Welcome,
            <span id="userName"></span>
            <!-- JS inserts logged in user's name -->
        </h2>

        <!-- Add Expense Section -->
<div class="card shadow p-4 mb-4">

    <h4 class="mb-3">
        Add Expense
    </h4>

    <div class="row">

        <!-- Description -->
        <div class="col-md-5">

            <input
                type="text"
                id="description"
                class="form-control"
                placeholder="Enter expense description">
            <!-- example:
                 uber
                 pizza
                 electricity bill -->

        </div>


        <!-- Amount -->
        <div class="col-md-4">

            <input
                type="number"
                id="amount"
                class="form-control"
                placeholder="Enter amount">

        </div>


        <!-- Button -->
        <div class="col-md-3">

            <button
                class="btn btn-success w-100"
                id="addExpenseButton">

                Add Expense

            </button>

        </div>

    </div>

</div>


        <!-- Dashboard Cards -->
        <div class="row">

            <!-- Total Spent -->
            <div class="col-md-4 mb-3">

                <div class="card shadow p-4">

                    <h5>Total Spent</h5>

                    <h3 id="totalSpent">
                        ₹0
                    </h3>
                    <!-- later api data -->

                </div>

            </div>


            <!-- Monthly Spent -->
            <div class="col-md-4 mb-3">

                <div class="card shadow p-4">

                    <h5>Monthly Spent</h5>

                    <h3 id="monthlySpent">
                        ₹0
                    </h3>

                </div>

            </div>


            <!-- Total Expenses -->

            <div class="col-md-3 mb-3">
                <div class="card shadow p-4">
                    <h5>Total Expenses</h5>
                    <h3 id="totalExpenses">0</h3>
                </div>
            </div>



            <!-- Top Category -->
            <div class="col-md-4 mb-3">

                <div class="card shadow p-4">

                    <h5>Top Category</h5>

                    <h3 id="topCategory">
                        none
                    </h3>

                </div>

            </div>

            
        </div>

    </div>

    <div class="card shadow p-4 mt-4">

    <h4 class="mb-3">
        Recent Expenses
    </h4>

    <table class="table">

        <thead>

            <tr>
                <th>Date</th>

                <th>Description</th>

                <th>Category</th>

                <th>Amount</th>

                <th>Delete</th>

            </tr>

        </thead>

        <tbody id="expenseTableBody">
            <!-- JS will insert expenses -->
        </tbody>

    </table>

</div>

<div class="card shadow p-4 mt-4">
    <h4>
        Category Spending
    </h4>
    <canvas id="categoryChart" style="max-height: 400px;"></canvas>
</div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="javascript/dashboard.js"></script>

</body>
</html>
