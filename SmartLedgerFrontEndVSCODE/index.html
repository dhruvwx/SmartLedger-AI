<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartLedger Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" href="">
</head>
<body class="bg-light"> <!-- Bootstrap background color -->

    <div class="container mt-5">
        <!-- container = centers content -->
        <!-- mt-5 = margin top spacing -->

        <div class="row justify-content-center">
            <!-- row creates layout -->
            <!-- justify-content-center = center horizontally -->

            <div class="col-md-5">
                <!-- medium screen and above take 5 columns width -->

                <div class="card shadow p-4">
                    <!-- card = bootstrap box -->
                    <!-- shadow = nice shadow -->
                    <!-- p-4 = padding -->

                    <h2 class="text-center mb-4 text-danger">
                        SmartLedger Login
                    </h2>

                    <!-- login form starts -->

                    <form id="loginForm">
                    <!-- JS listens to form submit -->

                        <div class="mb-3">
                            <!-- margin bottom spacing -->

                            <label>Email</label>

                            <input 
                                type="email" 
                                id="email"
                                class="form-control"
                                placeholder="Enter your email">
                            <!-- form-control = bootstrap styling -->
                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input 
                                type="password"
                                id="password"
                                class="form-control"
                                placeholder="Enter your password">
                        </div>

                        <button class="btn btn-primary w-100">
                            Login
                        </button>
                        <!-- btn-primary = blue button -->
                        <!-- w-100 = full width -->

                        <p class="text-center mt-3">

                           Don't have account?

                             <a href="register.html">
                                Register
                             </a>

                        </p>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="javascript/api.js"></script>
    <!-- connect auth -->
    <script src="javascript/auth.js"></script>
    <!-- connects auth -->

</body>
</html>
