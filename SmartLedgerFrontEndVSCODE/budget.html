<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand" href="dashboard.html">
            SmartLedger
        </a>

        <div>

            <a
            href="dashboard.html"
            class="btn btn-outline-light me-2">
            Dashboard
            </a>

            <a
            href="expense.html"
            class="btn btn-outline-light me-2">
            Expenses
            </a>

            <a
            href="budget.html"
            class="btn btn-outline-light me-2">
            Budgets
            </a>

            <button
            id="logoutButton"
            class="btn btn-danger">
            Logout
            </button>

        </div>

    </div>

</nav>

  <div class="container mt-5">
     <div class="card p-4 shadow">

      <h2>Budget Management</h2>

      <input type="number" id="budgetAmount" class="form-control mb-3" placeholder="Monthly Budget Amount"
      min="0.01"
      step="0.01"
      required>

      <input type="number" id="month" class="form-control mb-3" placeholder="Month"
      required>

      <input type="number" id="year" class="form-control mb-3" placeholder="Year"
      required>

      <select id="category" class="form-select mb-3" required>
        <option value="">Select Category</option>
      </select>

      <button id="saveBudgetButton" class="btn btn-primary">Save Budget</button>


      <hr>
      <table class="table mt-3">
        <thead>
          <tr>
            <th>Budget Limit</th>
            <th>category</th> 
            <th>Spent</th> 
            <th>Remaining</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="budgetTableBody"></tbody>
      </table>
    

     </div>
  </div>
  
  <script src="javascript/api.js"></script>
  <script src="javascript/common.js"></script>
  <script src="javascript/budget.js"></script>
</body>
</html>
